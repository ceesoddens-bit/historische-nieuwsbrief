<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artikel - Historische Nieuwsbrief</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Zwevende Navigatiebalk -->
    <nav class="navbar">
        <a href="index.html" class="nav-brand">
            <div class="nav-logo">HN</div>
            <div class="nav-titles">
                <span class="nav-main-title">HISTORISCHE NIEUWSBRIEF</span>
                <span class="nav-sub-title">"Carpe Diem, sed discite ex praeterito"</span>
            </div>
        </a>
        <div class="nav-links">
            <a href="#" class="nav-link">Tijdvakken</a>
            <a href="#" class="nav-link">Locaties</a>
            <a href="#" class="nav-link">Verhalen</a>
            <a href="#" class="nav-link">Contact</a>
        </div>
    </nav>

    <!-- Artikel Detail Content -->
    <main class="article-detail-container" id="article-main-container">
        <!-- Actief opgebouwd op basis van layout -->
        <h1 class="detail-title" id="detail-title">Laden...</h1>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-links">
            <a href="#" class="footer-link">Privacybeleid</a>
            <a href="#" class="footer-link">Algemene Voorwaarden</a>
            <a href="#" class="footer-link">Contact</a>
            <a href="admin.html" class="footer-link">Login</a>
        </div>
        <p style="color: #64748b; font-size: 0.9rem; margin: 0;">&copy; 2026 Historische Nieuwsbrief</p>
    </footer>

    <script type="module" src="app.js"></script>
    <script type="module">
        (async () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const articles = await window.getArticles();
            const article = articles.find(a => a.id === id) || articles[0]; // Fallback to first
            
            if (article) {
                const layout = article.layout || '1';
                const container = document.getElementById('article-main-container');
                
                const parseContent = (text) => {
                    if (!text) return '';
                    return text.split('\n').filter(p => p.trim() !== '').map(p => `<p>${p}</p>`).join('');
                };

                const titleHtml = `<h1 class="detail-title">${article.title}</h1>`;
                const img1Html = article.image ? `<div class="detail-hero-image" style="background-image: url('${article.image}'); background-size: cover; background-position: center; border: none; margin-bottom: 2rem;"></div>` : '';
                const img2Html = article.image2 ? `<div class="detail-hero-image" style="background-image: url('${article.image2}'); background-size: cover; background-position: center; border: none; margin-bottom: 2rem; margin-top: 2rem;"></div>` : '';
                const text1Html = article.content ? `<article class="detail-content">${parseContent(article.content)}</article>` : '';
                const text2Html = article.content2 ? `<article class="detail-content">${parseContent(article.content2)}</article>` : '';

                if (layout === '1') {
                    // [Kop, Foto, Tekst]
                    container.innerHTML = titleHtml + img1Html + text1Html;
                } else if (layout === '2') {
                    // [Kop, Foto, Tekst, Foto, Tekst]
                    container.innerHTML = titleHtml + img1Html + text1Html + img2Html + text2Html;
                } else if (layout === '3') {
                    // [Kop, Tekst, Foto, Tekst]
                    container.innerHTML = titleHtml + text1Html + img1Html + text2Html;
                } else {
                    container.innerHTML = titleHtml + img1Html + text1Html;
                }
                
                document.title = `${article.title} - Historische Nieuwsbrief`;
            } else {
                document.getElementById('article-main-container').innerHTML = '<h1 class="detail-title">Artikel niet gevonden</h1>';
            }
        })();
    </script>
</body>
</html>
