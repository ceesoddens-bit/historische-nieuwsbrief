<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Historische Nieuwsbrief</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Admin Navigatiebalk -->
    <nav class="admin-navbar">
        <div class="admin-navbar-brand" style="display: flex; gap: 20px; align-items: center;">
            <a href="index.html" class="admin-nav-link" style="font-size: 0.85rem; border: 1px solid #444; padding: 6px 12px; border-radius: 6px;">&larr; Naar site</a>
            <span>HN Beheer</span>
        </div>
        <div class="admin-nav-links">
            <a href="admin.html" class="admin-nav-link active">Dashboard</a>
            <a href="create-article.html" class="admin-nav-link">Nieuw Artikel</a>
            <a href="email-wireframe.html" target="_blank" class="admin-nav-link">Preview Nieuwsbrief</a>
            <a href="#" class="admin-nav-link">Instellingen</a>
        </div>
    </nav>

    <!-- Content -->
    <main class="admin-container">
        
        <div class="admin-header">
            <h1>Artikeloverzicht</h1>
            <div style="display: flex; gap: 15px; align-items: center;">
                <button id="export-n8n-btn" class="article-button" style="background: #2563eb; color: #fff; cursor: pointer; border: none; font-weight: bold; padding: 8px 16px;">Genereer n8n HTML</button>
                <button id="save-order-btn" class="article-button" style="background: transparent; color: #111; cursor: pointer; border: 2px solid #111;">Volgorde Opslaan</button>
                <a href="create-article.html" class="btn-primary">+ Nieuw Artikel</a>
            </div>
        </div>

        <div id="admin-article-list" class="draggable-list">
            <!-- Dynamisch gevuld door JS -->
        </div>

    </main>

    <!-- Export Modal -->
    <div id="export-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; justify-content: center; align-items: center;">
        <div style="background: #fff; padding: 30px; border-radius: 12px; width: 90%; max-width: 800px; box-shadow: 0 25px 50px rgba(0,0,0,0.2);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2 id="export-modal-title" style="margin: 0; font-size: 1.5rem;">Gegenereerde Mailchimp Code</h2>
                <button id="close-modal-btn" style="background: none; border: none; font-size: 2rem; cursor: pointer;">&times;</button>
            </div>
            <p id="export-modal-desc" style="margin-bottom: 15px; color: #555;">Kopieer deze code rechtsreeks naar een "Custom HTML" of code blok in je Mailchimp template.</p>
            <textarea id="export-textarea" style="width: 100%; height: 350px; font-family: monospace; padding: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.85rem;" readonly></textarea>
            <button id="copy-clipboard-btn" class="btn-primary" style="margin-top: 15px; display: block; width: 100%; text-align: center; border: none; cursor: pointer;">Kopieer naar Klembord</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderAdminList();
            
            const list = document.getElementById('admin-article-list');
            if(list) {
                Sortable.create(list, {
                    handle: '.drag-handle',
                    animation: 150,
                    ghostClass: 'sortable-ghost',
                    dragClass: 'sortable-drag',
                    forceFallback: true,
                    fallbackClass: 'sortable-drag',
                    onEnd: function (evt) {
                        const saveBtn = document.getElementById('save-order-btn');
                        if (saveBtn) {
                            saveBtn.style.background = '#dc2626';
                            saveBtn.style.color = '#fff';
                            saveBtn.style.border = '2px solid #dc2626';
                            saveBtn.innerText = 'Volgorde Opslaan (Niet Opgeslagen)';
                        }
                    }
                });
            }
            
            document.getElementById('save-order-btn').addEventListener('click', () => {
                const items = Array.from(list.children);
                const newOrderIds = items.map(item => item.dataset.id);
                reorderArticles(newOrderIds);
                
                const saveBtn = document.getElementById('save-order-btn');
                if (saveBtn) {
                    saveBtn.style.background = 'transparent';
                    saveBtn.style.color = '#111';
                    saveBtn.style.border = '2px solid #111';
                    saveBtn.innerText = 'Volgorde Opslaan';
                }
                
                alert('De nieuwe volgorde is succesvol opgeslagen en direct actief!');
            });
            
            // Export logic
            const modal = document.getElementById('export-modal');
            const closeBtn = document.getElementById('close-modal-btn');
            const copyBtn = document.getElementById('copy-clipboard-btn');
            const textarea = document.getElementById('export-textarea');
            
            let defaultCopyText = "Kopieer naar Klembord";
            
            closeBtn.addEventListener('click', () => modal.style.display = 'none');
            copyBtn.addEventListener('click', () => {
                textarea.select();
                document.execCommand('copy');
                copyBtn.innerText = "Gekopieerd!";
                setTimeout(() => copyBtn.innerText = defaultCopyText, 2000);
            });
            
            document.getElementById('export-n8n-btn').addEventListener('click', async () => {
                document.getElementById('export-modal-title').innerText = "Gegenereerde n8n HTML Code";
                document.getElementById('export-modal-desc').innerText = "Kopieer deze code en gebruik het direct als Email node body in n8n. Alle elementen zijn als standalone HTML hardcoded ingevoerd en Mailchimp attributen zijn gestript.";
                defaultCopyText = "Kopieer HTML voor n8n";
                copyBtn.innerText = defaultCopyText;
                
                try {
                    const response = await fetch('email-wireframe.html');
                    if(!response.ok) throw new Error("Netwerk error");
                    const htmlText = await response.text();
                    
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(htmlText, "text/html");
                    const articles = getArticles();
                    
                    const inject = (prefix, article) => {
                        const titleEl = doc.querySelector(`[mc\\:edit="${prefix}_titel"]`);
                        if(titleEl) titleEl.innerText = article.title;
                        
                        const imgEl = doc.querySelector(`[mc\\:edit="${prefix}_img"]`);
                        if(imgEl && article.image) imgEl.src = article.image;
                        
                        const textEl = doc.querySelector(`[mc\\:edit="${prefix}_tekst"]`);
                        if(textEl && article.content) textEl.innerHTML = `<p style="font-size: 15px; color: #f9f9f9; line-height: 1.6; margin: 0;">${article.content}</p>`;
                    };
                    
                    if(articles.length > 0) inject('hoofd', articles[0]);
                    if(articles.length > 1) inject('sub1', articles[1]);
                    if(articles.length > 2) inject('sub2', articles[2]);
                    
                    doc.querySelectorAll('[mc\\:edit]').forEach(el => el.removeAttribute('mc:edit'));
                    
                    let finalHTML = "<!DOCTYPE html>\\n" + doc.documentElement.outerHTML;
                    finalHTML = finalHTML.replace(/%2A%7C(.*?)%7C%2A/gi, '*|$1|*');
                    
                    textarea.value = finalHTML;
                    modal.style.display = 'flex';
                } catch(e) {
                    alert('Kon template niet inladen. Als je dit opent zonder lokale server (file:// protocol) dan blokkeert de browser deze fetch actie (CORS). Zorg dat je github pages test-link draait.');
                }
            });

        });
    </script>
</body>
</html>
