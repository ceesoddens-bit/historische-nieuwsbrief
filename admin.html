<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Historische Nieuwsbrief</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Admin Navigatiebalk -->
    <nav class="admin-navbar">
        <div class="admin-navbar-brand" style="display: flex; gap: 16px; align-items: center;">
            <div class="nav-logo" style="width:40px;height:40px;font-size:1rem;">HN</div>
            <span>HN Beheer</span>
        </div>
        <div class="admin-nav-links">
            <a href="admin.html" class="admin-nav-link active">Dashboard</a>
            <a href="index.html" class="admin-nav-link">&larr; Naar site</a>
        </div>
    </nav>

    <!-- Workflow Toolbar -->
    <div class="workflow-toolbar">
        <div class="workflow-steps">

            <!-- Stap 1: Nieuw artikel -->
            <a href="create-article.html" class="workflow-step step-create" id="step1">
                <span class="step-number">1</span>
                <div class="step-body">
                    <span class="step-label">Nieuw Artikel</span>
                    <span class="step-hint">Schrijf &amp; bewerk</span>
                </div>
                <span class="step-icon">✏️</span>
            </a>

            <div class="step-arrow">›</div>

            <!-- Stap 2: Volgorde opslaan -->
            <button class="workflow-step step-save" id="save-order-btn">
                <span class="step-number">2</span>
                <div class="step-body">
                    <span class="step-label">Volgorde Opslaan</span>
                    <span class="step-hint">Sleep &amp; bewaar</span>
                </div>
                <span class="step-icon">💾</span>
            </button>

            <div class="step-arrow">›</div>

            <!-- Stap 3: Preview nieuwsbrief -->
            <button class="workflow-step step-preview" id="preview-email-btn">
                <span class="step-number">3</span>
                <div class="step-body">
                    <span class="step-label">Preview</span>
                    <span class="step-hint">Nieuwsbrief bekijken</span>
                </div>
                <span class="step-icon">👁️</span>
            </button>

            <div class="step-arrow">›</div>

            <!-- Stap 4: Update HTML -->
            <button class="workflow-step step-update" id="update-doc-btn">
                <span class="step-number">4</span>
                <div class="step-body">
                    <span class="step-label">Update HTML</span>
                    <span class="step-hint">Naar Mailchimp doc</span>
                </div>
                <span class="step-icon">🔄</span>
            </button>

            <div class="step-arrow">›</div>

            <!-- Stap 5: Test mail -->
            <button class="workflow-step step-testmail" id="test-mail-btn">
                <span class="step-number">5</span>
                <div class="step-body">
                    <span class="step-label">Zend Test Mail</span>
                    <span class="step-hint">Controleer e-mail</span>
                </div>
                <span class="step-icon">📧</span>
            </button>

        </div>

        <!-- Stap 6: Automatisch verzenden badge -->
        <div class="auto-send-badge">
            <span class="auto-send-icon">🕕</span>
            <div>
                <span class="auto-send-title">Automatisch verzonden</span>
                <span class="auto-send-sub">Elke vrijdag om 06:00 wordt de meest recent bijgewerkte versie verzonden</span>
            </div>
        </div>
    </div>

    <!-- Content -->
    <main class="admin-container">
        
        <div class="admin-header">
            <h1>Artikeloverzicht</h1>
        </div>

        <div id="admin-article-list" class="draggable-list">
            <!-- Dynamisch gevuld door JS -->
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script type="module" src="app.js"></script>
    <script type="module">
        (async () => {
            if (sessionStorage.getItem('hn_auth') !== 'true') {
                window.location.href = 'login.html';
                return;
            }
            await window.renderAdminList();
            
            const list = document.getElementById('admin-article-list');
            if(list) {
                Sortable.create(list, {
                    animation: 150,
                    ghostClass: 'sortable-ghost',
                    dragClass: 'sortable-drag',
                    forceFallback: true,
                    fallbackClass: 'sortable-drag',
                    onEnd: function (evt) {
                        const saveBtn = document.getElementById('save-order-btn');
                        if (saveBtn) {
                            saveBtn.classList.add('unsaved');
                            saveBtn.querySelector('.step-label').innerText = 'Opslaan!';
                            saveBtn.querySelector('.step-hint').innerText = 'Niet-opgeslagen wijzigingen';
                        }
                    }
                });
            }
            
            document.getElementById('save-order-btn').addEventListener('click', async () => {
                const items = Array.from(list.children);
                const newOrderIds = items.map(item => item.dataset.id);
                
                const saveBtn = document.getElementById('save-order-btn');
                const labelEl = saveBtn ? saveBtn.querySelector('.step-label') : null;
                const hintEl  = saveBtn ? saveBtn.querySelector('.step-hint')  : null;

                if (saveBtn) {
                    saveBtn.disabled = true;
                    if (labelEl) labelEl.innerText = 'Synchroniseren...';
                    if (hintEl)  hintEl.innerText  = 'Even geduld';
                }
                
                await window.reorderArticles(newOrderIds);
                
                if (saveBtn) {
                    saveBtn.classList.remove('unsaved');
                    saveBtn.disabled = false;
                    if (labelEl) labelEl.innerText = 'Volgorde Opslaan';
                    if (hintEl)  hintEl.innerText  = 'Sleep & bewaar';
                }
                
                alert('De nieuwe volgorde is succesvol opgeslagen!');
            });

            document.getElementById('test-mail-btn').addEventListener('click', async () => {
                const btn = document.getElementById('test-mail-btn');
                const originalText = btn.innerText;
                
                try {
                    btn.innerText = "Bezig...";
                    btn.disabled = true;
                    
                    const response = await fetch('email-wireframe.html');
                    if(!response.ok) throw new Error("Netwerk error");
                    const htmlText = await response.text();
                    
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(htmlText, "text/html");
                    const articles = await window.getArticles();
                    
                    const inject = (prefix, article) => {
                        const articleUrl = `https://ceesoddens-bit.github.io/historische-nieuwsbrief/article-detail.html?id=${article.id}`;
                        
                        const titleEl = doc.querySelector(`[mc\\:edit="${prefix}_titel"]`);
                        if(titleEl) {
                            titleEl.innerHTML = `<a href="${articleUrl}" style="color: inherit; text-decoration: none;">${article.title}</a>`;
                        }
                        
                        const imgEl = doc.querySelector(`[mc\\:edit="${prefix}_img"]`);
                        if(imgEl && article.image) {
                            imgEl.src = article.image;
                            const wrapper = doc.createElement('a');
                            wrapper.href = articleUrl;
                            wrapper.style.display = 'block';
                            imgEl.parentNode.insertBefore(wrapper, imgEl);
                            wrapper.appendChild(imgEl);
                        }
                        
                        const textEl = doc.querySelector(`[mc\\:edit="${prefix}_tekst"]`);
                        if(textEl) {
                            textEl.innerHTML = `<a href="${articleUrl}" style="color: #f97316; font-size: 14px; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 8px;">Lees artikel op website &rarr;</a>`;
                        }
                    };
                    
                    if(articles.length > 0) inject('hoofd', articles[0]);
                    if(articles.length > 1) inject('sub1', articles[1]);
                    if(articles.length > 2) inject('sub2', articles[2]);
                    
                    doc.querySelectorAll('[mc\\:edit]').forEach(el => el.removeAttribute('mc:edit'));
                    
                    let finalHTML = "<!DOCTYPE html>\n" + doc.documentElement.outerHTML;
                    finalHTML = finalHTML.replace(/%2A%7C(.*?)%7C%2A/gi, '*|$1|*');
                    
                    let testWebhookUrl = "https://ceesodd.app.n8n.cloud/webhook/1c0a312d-641b-4c40-a52a-aa0dff478b07/";

                    const postRes = await fetch(testWebhookUrl, {
                        method: 'POST',
                        body: JSON.stringify({
                            action: "test_mail",
                            html: finalHTML
                        })
                    });

                    if (!postRes.ok) {
                        throw new Error(`Server reageerde met status: ${postRes.status} ${postRes.statusText}`);
                    }

                    alert("Test mail is verzonden!");
                    
                } catch(e) {
                    alert('Fout bij verzenden test mail: ' + e.message);
                } finally {
                    btn.innerText = originalText;
                    btn.disabled = false;
                }
            });

            document.getElementById('update-doc-btn').addEventListener('click', async () => {
                const btn = document.getElementById('update-doc-btn');
                const originalText = btn.innerText;
                
                try {
                    btn.innerText = "Bezig...";
                    btn.disabled = true;
                    
                    const response = await fetch('email-wireframe.html');
                    if(!response.ok) throw new Error("Netwerk error bij inladen wireframe");
                    const htmlText = await response.text();
                    
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(htmlText, "text/html");
                    const articles = await window.getArticles();
                    
                    const inject = (prefix, article) => {
                        const articleUrl = `https://ceesoddens-bit.github.io/historische-nieuwsbrief/article-detail.html?id=${article.id}`;
                        
                        const titleEl = doc.querySelector(`[mc\\:edit="${prefix}_titel"]`);
                        if(titleEl) {
                            titleEl.innerHTML = `<a href="${articleUrl}" style="color: inherit; text-decoration: none;">${article.title}</a>`;
                        }
                        
                        const imgEl = doc.querySelector(`[mc\\:edit="${prefix}_img"]`);
                        if(imgEl && article.image) {
                            imgEl.src = article.image;
                            const wrapper = doc.createElement('a');
                            wrapper.href = articleUrl;
                            wrapper.style.display = 'block';
                            imgEl.parentNode.insertBefore(wrapper, imgEl);
                            wrapper.appendChild(imgEl);
                        }
                        
                        const textEl = doc.querySelector(`[mc\\:edit="${prefix}_tekst"]`);
                        if(textEl) {
                            textEl.innerHTML = `<a href="${articleUrl}" style="color: #f97316; font-size: 14px; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 8px;">Lees artikel op website &rarr;</a>`;
                        }
                    };
                    
                    if(articles.length > 0) inject('hoofd', articles[0]);
                    if(articles.length > 1) inject('sub1', articles[1]);
                    if(articles.length > 2) inject('sub2', articles[2]);
                    
                    doc.querySelectorAll('[mc\\:edit]').forEach(el => el.removeAttribute('mc:edit'));
                    
                    let finalHTML = "<!DOCTYPE html>\n" + doc.documentElement.outerHTML;
                    finalHTML = finalHTML.replace(/%2A%7C(.*?)%7C%2A/gi, '*|$1|*');
                    
                    let webhookUrl = "https://ceesodd.app.n8n.cloud/webhook/e8710f1b-2044-4347-9c97-d37a25177107";

                    const postRes = await fetch(webhookUrl, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            html: finalHTML,
                            docId: "1Kd4EAoKHoZQ1ymHRxez2KgTIg4RqXwGbNNYfcCCN92I"
                        })
                    });

                    if (!postRes.ok) {
                        throw new Error(`Webhook weigerde met status: ${postRes.status}`);
                    }

                    alert("Document succesvol geüpdatet!");
                    
                } catch (e) {
                    alert("Fout bij updaten document: " + e.message);
                } finally {
                    btn.innerText = originalText;
                    btn.disabled = false;
                }
            });

            document.getElementById('preview-email-btn').addEventListener('click', async () => {
                try {
                    const response = await fetch('email-wireframe.html');
                    if(!response.ok) throw new Error("Netwerk error");
                    const htmlText = await response.text();
                    
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(htmlText, "text/html");
                    const articles = await window.getArticles();
                    
                    const inject = (prefix, article) => {
                        const articleUrl = `https://ceesoddens-bit.github.io/historische-nieuwsbrief/article-detail.html?id=${article.id}`;
                        
                        const titleEl = doc.querySelector(`[mc\\:edit="${prefix}_titel"]`);
                        if(titleEl) {
                            titleEl.innerHTML = `<a href="${articleUrl}" style="color: inherit; text-decoration: none;">${article.title}</a>`;
                        }
                        
                        const imgEl = doc.querySelector(`[mc\\:edit="${prefix}_img"]`);
                        if(imgEl && article.image) {
                            imgEl.src = article.image;
                            const wrapper = doc.createElement('a');
                            wrapper.href = articleUrl;
                            wrapper.style.display = 'block';
                            imgEl.parentNode.insertBefore(wrapper, imgEl);
                            wrapper.appendChild(imgEl);
                        }
                        
                        const textEl = doc.querySelector(`[mc\\:edit="${prefix}_tekst"]`);
                        if(textEl) {
                            textEl.innerHTML = `<a href="${articleUrl}" style="color: #f97316; font-size: 14px; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 8px;">Lees artikel op website &rarr;</a>`;
                        }
                    };
                    
                    if(articles.length > 0) inject('hoofd', articles[0]);
                    if(articles.length > 1) inject('sub1', articles[1]);
                    if(articles.length > 2) inject('sub2', articles[2]);

                    // Verberg lege rijen om het netjes te houden
                    if(articles.length < 3) {
                        const tr = doc.querySelector(`[mc\\:edit="sub2_img"]`);
                        if(tr) tr.closest('table').closest('tr').style.display = 'none';
                    }
                    if(articles.length < 2) {
                        const tr = doc.querySelector(`[mc\\:edit="sub1_img"]`);
                        if(tr) tr.closest('table').closest('tr').style.display = 'none';
                    }
                    if(articles.length < 1) {
                        const tr = doc.querySelector(`[mc\\:edit="hoofd_img"]`);
                        if(tr) tr.closest('table').closest('tr').style.display = 'none';
                    }
                    
                    let finalHTML = "<!DOCTYPE html>\n" + doc.documentElement.outerHTML;
                    finalHTML = finalHTML.replace(/%2A%7C(.*?)%7C%2A/gi, '*|$1|*');
                    
                    const blob = new Blob([finalHTML], { type: 'text/html' });
                    const url = URL.createObjectURL(blob);
                    window.open(url, '_blank');
                } catch(e) {
                    alert('Preview laden mislukt.');
                }
            });

        })();
    </script>
</body>
</html>
