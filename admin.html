<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Historische Nieuwsbrief</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Admin Navigatiebalk -->
    <nav class="admin-navbar">
        <div class="admin-navbar-brand" style="display: flex; gap: 16px; align-items: center;">
            <div class="nav-logo" style="width:40px;height:40px;font-size:1rem;">HN</div>
            <span>HN Beheer</span>
        </div>
        <div class="admin-nav-links">
            <a href="admin.html" class="admin-nav-link active">Dashboard</a>
            <a href="index.html" class="admin-nav-link">&larr; Naar site</a>
        </div>
    </nav>

    <!-- Workflow Toolbar -->
    <div class="workflow-toolbar">
        <div class="workflow-steps">

            <!-- Stap 1 -->
            <a href="create-article.html" class="wf-btn" id="step1-btn">
                <span class="wf-num">1</span>
                <span class="wf-label">Nieuw Artikel</span>
            </a>

            <span class="wf-arrow">›</span>

            <!-- Stap 2 -->
            <button class="wf-btn" id="save-order-btn">
                <span class="wf-num">2</span>
                <span class="wf-label">Volgorde Opslaan</span>
            </button>

            <span class="wf-arrow">›</span>

            <!-- Stap 3 -->
            <button class="wf-btn" id="preview-email-btn">
                <span class="wf-num">3</span>
                <span class="wf-label">Preview</span>
            </button>

            <span class="wf-arrow">›</span>

            <!-- Stap 4 -->
            <button class="wf-btn" id="update-doc-btn">
                <span class="wf-num">4</span>
                <span class="wf-label">Upload nieuwsbrief naar mail-server</span>
            </button>

            <span class="wf-arrow">›</span>

            <!-- Stap 5 -->
            <button class="wf-btn" id="test-mail-btn">
                <span class="wf-num">5</span>
                <span class="wf-label">Zend Test Mail</span>
            </button>

        </div>

        <!-- Stap 6: Automatisch verzenden badge -->
        <div class="auto-send-badge">
            <span class="auto-send-icon">🕕</span>
            <div>
                <span class="auto-send-title">Automatisch verzonden</span>
                <span class="auto-send-sub">Elke vrijdag om 06:00 — meest recente versie</span>
            </div>
        </div>
    </div>

    <!-- Content -->
    <main class="admin-container">
        
        <div class="admin-header">
            <h1>Artikeloverzicht</h1>
        </div>

        <!-- Nieuwsbrief Intro Editor -->
        <div class="intro-editor-card" style="background: #ffffff; border-radius: 20px; padding: 30px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.03); margin-bottom: 30px;">
            <h2 style="font-size: 1.4rem; font-weight: 800; margin-bottom: 20px; color: #111111; display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 1.2rem;">✉️</span> Nieuwsbrief Introductie
            </h2>
            <div style="display: grid; grid-template-columns: 1fr; gap: 20px;">
                <div class="form-group">
                    <label for="intro-greeting" style="font-weight: 700; font-size: 0.9rem; color: #64748b; display: block; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;">Begroeting</label>
                    <input type="text" id="intro-greeting" placeholder="Bijv: Goedemorgen geschiedenisliefhebber," style="width: 100%; padding: 14px 18px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 1rem; outline: none; font-family: inherit; background: #fdfbf7;">
                </div>
                <div class="form-group">
                    <label for="intro-text" style="font-weight: 700; font-size: 0.9rem; color: #64748b; display: block; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;">Introductie tekst</label>
                    <textarea id="intro-text" rows="3" placeholder="Welkom bij de nieuwste editie van onze nieuwsbrief..." style="width: 100%; padding: 14px 18px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 1rem; outline: none; font-family: inherit; resize: vertical; background: #fdfbf7; line-height: 1.6;"></textarea>
                </div>
            </div>
            <p style="font-size: 0.75rem; color: #94a3b8; margin-top: 15px; font-style: italic;">Deze tekst wordt automatisch opgeslagen en gebruikt in de preview en test-mail.</p>
        </div>

        <div id="admin-article-list" class="draggable-list">
            <!-- Dynamisch gevuld door JS -->
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script type="module" src="app.js"></script>
    <script type="module">
        (async () => {
            if (sessionStorage.getItem('hn_auth') !== 'true') {
                window.location.href = 'login.html';
                return;
            }
            await window.renderAdminList();

            // ── STATE MACHINE ────────────────────────────────────────────
            // States per knop: 'idle' | 'urgent' | 'done'
            // Bewaar in sessionStorage zodat het page-refresh overleeft.

            const STATE_KEY = 'hn_wf_state';
            const defaultState = {
                save:    'idle',
                preview: 'idle',
                update:  'idle',
                testmail:'idle'
            };

            function loadState() {
                try { return JSON.parse(sessionStorage.getItem(STATE_KEY)) || defaultState; }
                catch { return defaultState; }
            }

            function saveState(s) {
                sessionStorage.setItem(STATE_KEY, JSON.stringify(s));
            }

            function applyState(s) {
                setBtn('save-order-btn',    s.save);
                setBtn('preview-email-btn', s.preview);
                setBtn('update-doc-btn',    s.update);
                setBtn('test-mail-btn',     s.testmail);
            }

            function setBtn(id, state) {
                const btn = document.getElementById(id);
                if (!btn) return;
                btn.classList.remove('wf-idle', 'wf-urgent', 'wf-done');
                btn.classList.add('wf-' + state);
            }

            // Initiële state
            let wf = loadState();
            applyState(wf);
            // ─────────────────────────────────────────────────────────────
            
            // ── INTRO EDITOR LOGIC ────────────────────────────────────────
            const greetingInput = document.getElementById('intro-greeting');
            const introTextInput = document.getElementById('intro-text');

            const STORAGE_INTRO_GREETING = 'hn_intro_greeting';
            const STORAGE_INTRO_TEXT = 'hn_intro_text';

            // Load saved intro or use defaults
            greetingInput.value = localStorage.getItem(STORAGE_INTRO_GREETING) || "Goedemorgen geschiedenisliefhebber,";
            introTextInput.value = localStorage.getItem(STORAGE_INTRO_TEXT) || "Welkom bij de nieuwste editie van onze nieuwsbrief. Hier blikken we terug op de verhalen die onze regio hebben gevormd en ontdekken we de verborgen verhalen uit het verleden.";

            // Auto-save on input
            const saveIntro = () => {
                localStorage.setItem(STORAGE_INTRO_GREETING, greetingInput.value);
                localStorage.setItem(STORAGE_INTRO_TEXT, introTextInput.value);
                // Mark update as urgent
                wf.update = 'urgent';
                saveState(wf); applyState(wf);
            };
            greetingInput.addEventListener('input', saveIntro);
            introTextInput.addEventListener('input', saveIntro);

            const getIntroHTML = () => {
                return `
                    <p style="font-size: 17px; line-height: 1.6; color: #111111; font-weight: bold; margin: 0 0 10px 0;">
                        ${greetingInput.value}
                    </p>
                    <p style="font-size: 15px; line-height: 1.8; color: #1a1a1a; margin: 0 0 40px 0;">
                        ${introTextInput.value}
                    </p>
                `;
            };

            const list = document.getElementById('admin-article-list');

            // Observe list changes (deletions/reorders) to trigger urgency
            const observer = new MutationObserver((mutations) => {
                const hadChange = mutations.some(m => m.type === 'childList');
                if (hadChange) {
                    wf.save = 'urgent';
                    wf.update = 'urgent';
                    saveState(wf);
                    applyState(wf);
                }
            });
            if (list) observer.observe(list, { childList: true });

            if(list) {
                Sortable.create(list, {
                    animation: 150,
                    ghostClass: 'sortable-ghost',
                    dragClass: 'sortable-drag',
                    forceFallback: true,
                    fallbackClass: 'sortable-drag',
                    onEnd: function (evt) {
                        // Handled by MutationObserver, but backup check
                        wf.save = 'urgent';
                        wf.update = 'urgent';
                        saveState(wf);
                        applyState(wf);
                    }
                });
            }
            
            // ── STAP 2: Volgorde opslaan ─────────────────────────────────
            document.getElementById('save-order-btn').addEventListener('click', async () => {
                const saveBtn = document.getElementById('save-order-btn');
                const labelEl = saveBtn.querySelector('.wf-label');
                const items = Array.from(list.children);
                const newOrderIds = items.map(item => item.dataset.id);

                saveBtn.disabled = true;
                if (labelEl) labelEl.innerText = 'Bezig…';

                const ok = await window.reorderArticles(newOrderIds);

                saveBtn.disabled = false;
                if (labelEl) labelEl.innerText = 'Volgorde Opslaan';

                if (ok !== false) {
                    wf.save = 'done';
                    saveState(wf);
                    applyState(wf);
                    alert('Volgorde opgeslagen!');
                } else {
                    alert('Fout bij opslaan. Probeer opnieuw.');
                }
            });

            // ── STAP 3: Preview ──────────────────────────────────────────
            document.getElementById('preview-email-btn').addEventListener('click', async () => {
                try {
                    const response = await fetch('email-wireframe.html');
                    if(!response.ok) throw new Error("Netwerk error");
                    const htmlText = await response.text();
                    
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(htmlText, "text/html");
                    const articles = await window.getArticles();
                    
                    const inject = (prefix, article) => {
                        const articleUrl = `https://ceesoddens-bit.github.io/historische-nieuwsbrief/article-detail.html?id=${article.id}`;
                        const titleEl = doc.querySelector(`[mc\\:edit="${prefix}_titel"]`);
                        if(titleEl) titleEl.innerHTML = `<a href="${articleUrl}" style="color: inherit; text-decoration: none;">${article.title}</a>`;
                        const authorEl = doc.querySelector(`[mc\\:edit="${prefix}_auteur"]`);
                        if(authorEl) authorEl.innerHTML = article.author ? `Door ${article.author}` : '';
                        const imgEl = doc.querySelector(`[mc\\:edit="${prefix}_img"]`);
                        if(imgEl && article.image) {
                            imgEl.src = article.image;
                            // Pas focal point toe voor e-mail clients die object-fit ondersteunen
                            const focal = article.focalPoint1 ? `${article.focalPoint1.x}% ${article.focalPoint1.y}%` : 'center';
                            imgEl.style.objectFit = 'cover';
                            imgEl.style.objectPosition = focal;
                            
                            const wrapper = doc.createElement('a');
                            wrapper.href = articleUrl; wrapper.style.display = 'block';
                            imgEl.parentNode.insertBefore(wrapper, imgEl); wrapper.appendChild(imgEl);
                        }
                    const captionEl = doc.querySelector(`[mc\\:edit="${prefix}_onderschrift"]`);
                        if(captionEl) captionEl.innerHTML = article.imageCaption || '';
                        const textEl = doc.querySelector(`[mc\\:edit="${prefix}_tekst"]`);
                        if(textEl) textEl.innerHTML = `<a href="${articleUrl}" style="color: #f97316; font-size: 14px; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 8px;">Lees artikel →</a>`;
                    };

                    // Inject Intro
                    const introEl = doc.querySelector('[mc\\:edit="intro_tekst"]');
                    if(introEl) introEl.innerHTML = getIntroHTML();
                    
                    if(articles.length > 0) inject('hoofd', articles[0]);
                    if(articles.length > 1) inject('sub1',  articles[1]);
                    if(articles.length > 2) inject('sub2',  articles[2]);

                    if(articles.length < 3) { const tr = doc.querySelector(`[mc\\:edit="sub2_img"]`); if(tr) tr.closest('table').closest('tr').style.display = 'none'; }
                    if(articles.length < 2) { const tr = doc.querySelector(`[mc\\:edit="sub1_img"]`); if(tr) tr.closest('table').closest('tr').style.display = 'none'; }
                    if(articles.length < 1) { const tr = doc.querySelector(`[mc\\:edit="hoofd_img"]`); if(tr) tr.closest('table').closest('tr').style.display = 'none'; }

                    let finalHTML = "<!DOCTYPE html>\n" + doc.documentElement.outerHTML;
                    finalHTML = finalHTML.replace(/%2A%7C(.*?)%7C%2A/gi, '*|$1|*');
                    const blob = new Blob([finalHTML], { type: 'text/html' });
                    window.open(URL.createObjectURL(blob), '_blank');

                    // Stap 3 = groen
                    wf.preview = 'done';
                    saveState(wf); applyState(wf);
                } catch(e) {
                    alert('Preview laden mislukt.');
                }
            });

            // ── STAP 4: Update HTML ──────────────────────────────────────
            document.getElementById('update-doc-btn').addEventListener('click', async () => {
                const btn = document.getElementById('update-doc-btn');
                const labelEl = btn.querySelector('.wf-label');
                try {
                    btn.disabled = true;
                    if (labelEl) labelEl.innerText = 'Bezig…';

                    const response = await fetch('email-wireframe.html');
                    if(!response.ok) throw new Error("Netwerk error bij inladen wireframe");
                    const htmlText = await response.text();
                    
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(htmlText, "text/html");
                    const articles = await window.getArticles();
                    
                    const inject = (prefix, article) => {
                        const articleUrl = `https://ceesoddens-bit.github.io/historische-nieuwsbrief/article-detail.html?id=${article.id}`;
                        const titleEl = doc.querySelector(`[mc\\:edit="${prefix}_titel"]`);
                        if(titleEl) titleEl.innerHTML = `<a href="${articleUrl}" style="color: inherit; text-decoration: none;">${article.title}</a>`;
                        const authorEl = doc.querySelector(`[mc\\:edit="${prefix}_auteur"]`);
                        if(authorEl) authorEl.innerHTML = article.author ? `Door ${article.author}` : '';
                        const imgEl = doc.querySelector(`[mc\\:edit="${prefix}_img"]`);
                        if(imgEl && article.image) {
                            imgEl.src = article.image;
                            // Pas focal point toe voor e-mail clients die object-fit ondersteunen
                            const focal = article.focalPoint1 ? `${article.focalPoint1.x}% ${article.focalPoint1.y}%` : 'center';
                            imgEl.style.objectFit = 'cover';
                            imgEl.style.objectPosition = focal;

                            const wrapper = doc.createElement('a');
                            wrapper.href = articleUrl; wrapper.style.display = 'block';
                            imgEl.parentNode.insertBefore(wrapper, imgEl); wrapper.appendChild(imgEl);
                        }
                    const captionEl = doc.querySelector(`[mc\\:edit="${prefix}_onderschrift"]`);
                        if(captionEl) captionEl.innerHTML = article.imageCaption || '';
                        const textEl = doc.querySelector(`[mc\\:edit="${prefix}_tekst"]`);
                        if(textEl) textEl.innerHTML = `<a href="${articleUrl}" style="color: #f97316; font-size: 14px; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 8px;">Lees artikel →</a>`;
                    };

                    // Inject Intro
                    const introEl = doc.querySelector('[mc\\:edit="intro_tekst"]');
                    if(introEl) introEl.innerHTML = getIntroHTML();
                    
                    if(articles.length > 0) inject('hoofd', articles[0]);
                    if(articles.length > 1) inject('sub1',  articles[1]);
                    if(articles.length > 2) inject('sub2',  articles[2]);
                    
                    doc.querySelectorAll('[mc\\:edit]').forEach(el => el.removeAttribute('mc:edit'));
                    let finalHTML = "<!DOCTYPE html>\n" + doc.documentElement.outerHTML;
                    finalHTML = finalHTML.replace(/%2A%7C(.*?)%7C%2A/gi, '*|$1|*');
                    
                    const postRes = await fetch("https://ceesodd.app.n8n.cloud/webhook/e8710f1b-2044-4347-9c97-d37a25177107", {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ html: finalHTML, docId: "1Kd4EAoKHoZQ1ymHRxez2KgTIg4RqXwGbNNYfcCCN92I" })
                    });
                    if (!postRes.ok) throw new Error(`Webhook weigerde met status: ${postRes.status}`);

                    // Stap 4 = done; stap 3 = done; stap 5 = urgent
                    wf.update = 'done'; 
                    wf.preview = 'done';
                    wf.testmail = 'urgent';
                    saveState(wf); 
                    applyState(wf);
                    alert("Nieuwsbrief succesvol geüpload naar mail-server!");

                } catch (e) {
                    alert("Fout bij updaten document: " + e.message);
                } finally {
                    btn.disabled = false;
                    if (labelEl) labelEl.innerText = 'Upload nieuwsbrief naar mail-server';
                }
            });

            // ── STAP 5: Test mail ────────────────────────────────────────
            document.getElementById('test-mail-btn').addEventListener('click', async () => {
                const btn = document.getElementById('test-mail-btn');
                const labelEl = btn.querySelector('.wf-label');
                try {
                    btn.disabled = true;
                    if (labelEl) labelEl.innerText = 'Bezig…';

                    const response = await fetch('email-wireframe.html');
                    if(!response.ok) throw new Error("Netwerk error");
                    const htmlText = await response.text();
                    
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(htmlText, "text/html");
                    const articles = await window.getArticles();
                    
                    const inject = (prefix, article) => {
                        const articleUrl = `https://ceesoddens-bit.github.io/historische-nieuwsbrief/article-detail.html?id=${article.id}`;
                        const titleEl = doc.querySelector(`[mc\\:edit="${prefix}_titel"]`);
                        if(titleEl) titleEl.innerHTML = `<a href="${articleUrl}" style="color: inherit; text-decoration: none;">${article.title}</a>`;
                        const authorEl = doc.querySelector(`[mc\\:edit="${prefix}_auteur"]`);
                        if(authorEl) authorEl.innerHTML = article.author ? `Door ${article.author}` : '';
                        const imgEl = doc.querySelector(`[mc\\:edit="${prefix}_img"]`);
                        if(imgEl && article.image) {
                            imgEl.src = article.image;
                            const wrapper = doc.createElement('a');
                            wrapper.href = articleUrl; wrapper.style.display = 'block';
                            imgEl.parentNode.insertBefore(wrapper, imgEl); wrapper.appendChild(imgEl);
                        }
                    const captionEl = doc.querySelector(`[mc\\:edit="${prefix}_onderschrift"]`);
                        if(captionEl) captionEl.innerHTML = article.imageCaption || '';
                        const textEl = doc.querySelector(`[mc\\:edit="${prefix}_tekst"]`);
                        if(textEl) textEl.innerHTML = `<a href="${articleUrl}" style="color: #f97316; font-size: 14px; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 8px;">Lees artikel →</a>`;
                    };

                    // Inject Intro
                    const introEl = doc.querySelector('[mc\\:edit="intro_tekst"]');
                    if(introEl) introEl.innerHTML = getIntroHTML();
                    
                    if(articles.length > 0) inject('hoofd', articles[0]);
                    if(articles.length > 1) inject('sub1',  articles[1]);
                    if(articles.length > 2) inject('sub2',  articles[2]);
                    
                    doc.querySelectorAll('[mc\\:edit]').forEach(el => el.removeAttribute('mc:edit'));
                    let finalHTML = "<!DOCTYPE html>\n" + doc.documentElement.outerHTML;
                    finalHTML = finalHTML.replace(/%2A%7C(.*?)%7C%2A/gi, '*|$1|*');

                    const postRes = await fetch("https://ceesodd.app.n8n.cloud/webhook/1c0a312d-641b-4c40-a52a-aa0dff478b07/", {
                        method: 'POST',
                        body: JSON.stringify({ action: "test_mail", html: finalHTML })
                    });
                    if (!postRes.ok) throw new Error(`Server reageerde met status: ${postRes.status} ${postRes.statusText}`);

                    // Stap 5 = groen
                    wf.testmail = 'done';
                    saveState(wf); applyState(wf);
                    alert("Test mail is verzonden!");

                } catch(e) {
                    alert('Fout bij verzenden test mail: ' + e.message);
                } finally {
                    btn.disabled = false;
                    if (labelEl) labelEl.innerText = 'Zend Test Mail';
                }
            });

        })();
    </script>
</body>
</html>
